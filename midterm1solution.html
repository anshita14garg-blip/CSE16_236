<!DOCTYPE html>
<html>
<head>
    <title>Even Odd Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(to right, #a0799e, #c03f84); height:100vh;">
<div class="d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 shadow" style="width: 350px; border-radius:15px;">
        <h3 class="text-center mb-3">Even Odd Checker</h3>
        <input type="number" id="num" class="form-control mb-3" placeholder="Enter a number">
        <button class="btn btn-primary w-100 mb-3" onclick="checkNumber()">Check</button>
        <p id="result" class="text-center fw-bold"></p>
        <p id="numbers" class="text-center text-muted"></p>
    </div>
</div>
<script>
function checkNumber() {
    let n = document.getElementById("num").value;
    n = parseInt(n);
    if (n % 2 === 0) {
        document.getElementById("result").innerHTML = "Even Number";
    } else {
        document.getElementById("result").innerHTML = "Odd Number";
    }
    let output = "";
    for (let i = 1; i <= n; i++) {
        output += i + " ";
    }
    document.getElementById("numbers").innerHTML = output;
}
</script>
</body>
</html>
