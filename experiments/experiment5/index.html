<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Imformation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Employee Salary Management System</h1>
<input type="text" id="name" placeholder="Employee Name">
<input type="text" id="empId" placeholder="Employee ID">
<input type="number" id="salary" placeholder="Salary">
<input type="text" id="department" placeholder="Department" >
<button onclick="addEmployee()">Add Employee</button>
<br>
<button onclick="displayAll()">Display All</button>
<button onclick="salaryAbove50k()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>
<button onclick="countByDepartment()">Count by Department</button>
<div id="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
