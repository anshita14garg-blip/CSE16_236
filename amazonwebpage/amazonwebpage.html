<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amazon Product Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f4f4f4;
}

nav a{
    text-decoration: none;
    margin: 0 10px;
    font-size: 18px;
}

.container{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    margin-top: 30px;
}

h2{
    text-align: center;
    margin-bottom: 10px;
}

.table-box{
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

table{
    width: 100%;
    border-collapse: collapse;
}

table th, table td{
    border: 1px solid #999;
    padding: 10px;
    text-align: center;
}

table th{
    background: #ffe6cc;
}

img{
    width: 130px;
    height: auto;
}
</style>
</head>
